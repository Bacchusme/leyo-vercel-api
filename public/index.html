<!DOCTYPE html>
<html lang="en">
<head>

<style>
body { -webkit-tap-highlight-color: transparent; }
.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
.pill-active { background-color: #ff5c00; color: #fff; border: 1px solid #ff5c00; }
.pill-inactive { background-color: transparent; color: #1b1c1c; border: 1px dashed #D1D1D1; }
.whisper-shadow { box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.05); }
@keyframes scaleIn { 0%{transform:scale(.8);opacity:0} 100%{transform:scale(1);opacity:1} }
@keyframes slideUpFade { 0%{transform:translateY(20px);opacity:0} 100%{transform:translateY(0);opacity:1} }
.animate-scale-in { animation: scaleIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards; }
.animate-slide-up-1 { opacity:0; animation: slideUpFade 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s forwards; }
.animate-slide-up-2 { opacity:0; animation: slideUpFade 0.6s cubic-bezier(0.16,1,0.3,1) 0.3s forwards; }
.animate-slide-up-3 { opacity:0; animation: slideUpFade 0.6s cubic-bezier(0.16,1,0.3,1) 0.4s forwards; }
.img-skeleton { background: linear-gradient(110deg, #ededed 8%, #f5f5f5 18%, #ededed 33%); background-size: 200% 100%; animation: imgShimmer 1.5s linear infinite; }
@keyframes imgShimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.img-fade { opacity:0; transition: opacity 0.4s ease; }
.img-fade.loaded { opacity:1; }
.page { display:none; }
.page.active { display:block; }

/* Photo Upload Component */
.photo-upload-zone {
  border: 2px dashed #d1d1d1;
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s ease;
  background: #fafafa;
  position: relative;
}
.photo-upload-zone:hover, .photo-upload-zone.drag-over {
  border-color: #ff5c00;
  background: #fff7f2;
}
.photo-upload-zone .upload-icon {
  font-size: 32px;
  color: #ff5c00;
  margin-bottom: 8px;
  display: block;
}
.photo-upload-zone .upload-text {
  font-size: 14px;
  color: #888;
  line-height: 1.5;
}
.photo-upload-zone .upload-hint {
  font-size: 11px;
  color: #bbb;
  margin-top: 4px;
}
.photo-preview {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: #f5f3f3;
  border-radius: 12px;
  position: relative;
}
.photo-preview img {
  width: 56px;
  height: 56px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
}
.photo-preview .photo-info {
  flex: 1;
  min-width: 0;
}
.photo-preview .photo-name {
  font-size: 13px;
  font-weight: 600;
  color: #1b1c1c;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.photo-preview .photo-size {
  font-size: 11px;
  color: #888;
  margin-top: 2px;
}
.photo-remove {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #e3e2e2;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #666;
  transition: background 0.2s;
}
.photo-remove:hover { background: #d1d1d1; }
.photo-status {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  font-size: 12px;
}
.photo-status.uploading { color: #ff5c00; }
.photo-status.success { color: #2ecc71; }
.photo-status.error { color: #e74c3c; }
.photo-status .spinner-sm {
  width: 14px;
  height: 14px;
  border: 2px solid #ff5c00;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-surface text-on-surface antialiased font-body-md text-body-md min-h-screen flex flex-col">

<!-- ═══ APP SHELL ═══ -->
<div id="app">
  <!-- Header -->
  <header id="mainHeader" class="flex justify-between items-center w-full px-5 py-3 h-16 bg-surface z-40 sticky top-0 border-b border-outline-variant/30">
    <div class="text-headline-lg font-headline-lg font-black text-primary cursor-pointer" onclick="goTo('locals')">LeYo</div>
    <nav class="flex items-center gap-5">
      <a id="navLocals" class="text-on-surface border-b-2 border-primary font-bold pb-0.5 cursor-pointer text-body-md" onclick="goTo('locals')">Locals</a>
      <a id="navSessions" class="text-secondary hover:opacity-80 transition-opacity cursor-pointer text-body-md" onclick="goTo('sessions')">Sessions</a>
    </nav>
  </header>

  <!-- Page Container -->
  <main id="pageContainer" class="flex-grow "></main>

</div>

<script>
// ══════════════════════════════════════════════════
// API CONFIGURATION
// ══════════════════════════════════════════════════
var API_BASE = 'https://leyo-vercel-api-l79c.vercel.app';

// 将飞书媒体URL转为代理URL，解决浏览器无法直接访问飞书图片的问题
function toProxyUrl(url) {
  if (!url || typeof url !== 'string') return '';
  // 已经是代理URL，直接返回
  if (url.indexOf('/api/image?') !== -1) return url;
  // 飞书媒体URL，提取file_token走代理
  if (url.indexOf('open.feishu.cn/open-apis/drive/v1/medias/') !== -1) {
    var match = url.match(/medias\/([^\/]+)\//);
    if (match) return API_BASE + '/api/image?token=' + match[1];
  }
  return url;
}
var _localsCache = [];
var _sessionsCache = [];
var _dataLoaded = false;
var _loadError = false;
var _photoToken = null;
var _photoUploading = false;

// ══════════════════════════════════════════════════
// API DATA LOADING
// ══════════════════════════════════════════════════
async function loadLocalsFromAPI(city) {
  try {
    var url = API_BASE + '/api/locals';
    if (city && city !== 'all') url += '?city=' + encodeURIComponent(city);
    var resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var json = await resp.json();
    return json.data || json;
  } catch (e) {
    console.error('loadLocalsFromAPI error:', e);
    return [];
  }
}

async function loadSessionsFromAPI(filters) {
  try {
    var params = new URLSearchParams();
    if (filters) {
      if (filters.city && filters.city !== 'all') params.set('city', filters.city);
      if (filters.local_name) params.set('local_name', filters.local_name);
    }
    var url = API_BASE + '/api/sessions' + (params.toString() ? '?' + params.toString() : '');
    var resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var json = await resp.json();
    return json.data || json;
  } catch (e) {
    console.error('loadSessionsFromAPI error:', e);
    return [];
  }
}

function nameToColor(name) {
  var colors = ['#8B0000','#006400','#00008B','#8B8B00','#8B008B','#008B8B','#4B0082','#FF4500','#2F4F4F','#800080'];
  var hash = 0;
  for (var i = 0; i < name.length; i++) { hash = name.charCodeAt(i) + ((hash << 5) - hash); }
  return colors[Math.abs(hash) % colors.length];
}

function transformAPILocal(item) {
  var name = item.name || 'Unknown';
  var avatarUrl = '';
  if (item.avatar_data) {
    // 服务端已下载好的 base64 数据，直接使用
    avatarUrl = item.avatar_data;
  } else if (item.avatar_url) {
    avatarUrl = toProxyUrl(item.avatar_url);
  } else if (Array.isArray(item.avatar) && item.avatar.length > 0) {
    var att = item.avatar[0];
    // 统一走代理端点，服务端有三层兜底（downloadMedia / batch_tmp / 直链代理）
    if (att.file_token) {
      avatarUrl = API_BASE + '/api/image?token=' + encodeURIComponent(att.file_token) + (att.url ? '&url=' + encodeURIComponent(att.url) : '');
    } else if (att.url) {
      avatarUrl = API_BASE + '/api/image?url=' + encodeURIComponent(att.url);
    }
  } else if (typeof item.avatar === 'string' && (item.avatar.startsWith('http') || item.avatar.startsWith('data:'))) {
    avatarUrl = toProxyUrl(item.avatar);
  }
  var hangs = parseInt(item.hangs) || 0;
  var rating = parseFloat(item.rating) || 4.5;
  var city = item.city || '';
  var tags = Array.isArray(item.tags) ? item.tags.map(function(t) { return t + ' \u00b7 ' + city; }) : [];
  var langs = Array.isArray(item.langs) ? item.langs : [];

  return {
    id: item.record_id || item.name,
    name: name,
    initial: name.charAt(0).toUpperCase(),
    color: nameToColor(name),
    avatar: avatarUrl,
    tagline: item.tagline || '',
    tags: tags,
    tags2: Array.isArray(item.tags2) ? item.tags2 : (Array.isArray(item.tags) ? item.tags : []),
    langs: langs,
    bio: item.bio || '',
    stats: { hangs: hangs, friends: 0, rating: rating },
    avail: [],
    upcoming: [],
    reviews: [],
    activities: [],
    city: city,
    is_active: item.is_active
  };
}

function parseReviews(text) {
  if (!text) return [];
  var lines = text.split('\n').filter(function(line) { return line.trim(); });
  // Deduplicate: if same text appears more than once, keep only first
  var seen = {};
  return lines.filter(function(line) {
    var key = line.trim();
    if (seen[key]) return false;
    seen[key] = true;
    return true;
  }).map(function(line) {
    line = line.trim();
    // Format: "★★★★★ Name (date): review text"
    var m = line.match(/^([★☆\u2605\u2606]*)\s*(.+?)\s*\(([^)]*)\)\s*[:：]\s*(.+)$/);
    if (m) {
      var starsRaw = m[1] || '';
      var name = m[2].trim();
      var date = m[3].trim();
      var reviewText = m[4].trim();
      // Normalize stars
      var starCount = (starsRaw.match(/[\u2605★]/g) || []).length;
      if (starCount === 0) starCount = 5;
      var stars = '';
      for (var i = 0; i < starCount; i++) stars += '\u2605';
      return { av: name.charAt(0), name: name, date: date, stars: stars, text: reviewText };
    }
    // Fallback: pipe-separated format "name|date|stars|text"
    var parts = line.split('|');
    if (parts.length >= 4) {
      return { av: parts[0].trim().charAt(0), name: parts[0].trim(), date: parts[1].trim(), stars: parts[2].trim(), text: parts[3].trim() };
    }
    // Last fallback: just show as text
    return { av: '?', name: 'Review', date: '', stars: '\u2605\u2605\u2605\u2605\u2605', text: line };
  });
}

function transformAPISession(item) {
  var gallary = Array.isArray(item.gallary) ? item.gallary : [];
  var imgUrl = '';
  if (gallary.length > 0) {
    var g0 = gallary[0];
    // 统一走代理端点，服务端有三层兜底（downloadMedia / batch_tmp / 直链代理）
    if (g0.file_token) {
      imgUrl = API_BASE + '/api/image?token=' + encodeURIComponent(g0.file_token) + (g0.url ? '&url=' + encodeURIComponent(g0.url) : '');
    } else if (g0.url) {
      imgUrl = API_BASE + '/api/image?url=' + encodeURIComponent(g0.url);
    }
  }
  var detailImgs = gallary.slice(1).map(function(g) {
    if (g.file_token) return API_BASE + '/api/image?token=' + encodeURIComponent(g.file_token) + (g.url ? '&url=' + encodeURIComponent(g.url) : '');
    if (g.url) return API_BASE + '/api/image?url=' + encodeURIComponent(g.url);
    return '';
  }).filter(Boolean);
  var reviews = parseReviews(item.reviews);
  var ratingStr = '';
  if (reviews.length > 0) {
    var totalStars = 0;
    reviews.forEach(function(r) {
      var m = r.stars.match(/\u2605/g);
      totalStars += m ? m.length : 5;
    });
    ratingStr = (totalStars / reviews.length).toFixed(1);
  }
  var locationArr = Array.isArray(item.location) ? item.location : [];
  var locationStr = locationArr.join(', ');

  return {
    id: item.record_id || item.title,
    title: item.title || '',
    desc: item.description || '',
    emoji: item.emoji || '\ud83c\udf1f',
    type: (item.schedule && item.schedule.trim()) ? 'upcoming' : 'sayhi',
    hostId: item.local_name || '',
    hostName: item.local_name || '',
    tags: Array.isArray(item.tags) ? item.tags : [],
    cost: item.cost || 'Free',
    costDetail: '',
    aa: '',
    hangs: 0,
    rating: ratingStr,
    img: imgUrl,
    detailImgs: detailImgs,
    flex: item.time_slot || (item.schedule ? 'Flexible' : ''),
    grid: {
      date: item.schedule || '',
      time: item.time_slot || '',
      location: locationStr,
      people: item.max_people || '',
      spotsLeft: ''
    },
    joined: 0,
    total: parseInt(item.max_people) || 4,
    going: [],
    reviews: reviews,
    city: item.city || '',
    is_active: item.is_active
  };
}

async function loadAllData() {
  var container = document.getElementById('pageContainer');
  if (container) {
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px"><div style="width:40px;height:40px;border:3px solid #ff5c00;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite"></div><p style="color:#888;font-size:14px">Loading experiences...</p></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
  }
  try {
    var results = await Promise.all([loadLocalsFromAPI(), loadSessionsFromAPI()]);
    var rawLocals = results[0];
    var rawSessions = results[1];

    _localsCache = rawLocals.map(transformAPILocal);
    _sessionsCache = rawSessions.map(function(s) { return transformAPISession(s); });

    // Populate avail/upcoming/activities for each local from sessions
    _localsCache.forEach(function(loc) {
      var mySessions = _sessionsCache.filter(function(s) { return s.hostId === loc.name; });
      loc.avail = mySessions.filter(function(s) { return s.type === 'sayhi'; }).map(function(s) {
        return { e: s.emoji, t: s.title, m: (s.grid && s.grid.location ? s.grid.location : 'Flexible') + ' \u00b7 ' + (s.cost || 'Free'), img: s.img };
      });
      loc.upcoming = mySessions.filter(function(s) { return s.type === 'upcoming'; }).map(function(s) {
        return { e: s.emoji, t: s.title, m: (s.grid ? s.grid.date : '') + ' \u00b7 ' + (s.grid && s.grid.location ? s.grid.location : ''), img: s.img };
      });
      loc.activities = mySessions.map(function(s) {
        return { e: s.emoji, t: s.title, m: (s.grid && s.grid.location ? s.grid.location : 'Flexible') + ' · ' + (s.cost || 'Free'), img: s.img };
      });
    });

    _dataLoaded = true;
    _loadError = false;
  } catch (e) {
    console.error('loadAllData error:', e);
    _loadError = true;
    if (container) {
      container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px;padding:40px;text-align:center"><p style="font-size:18px;color:#333">\ud83d\ude15 Failed to load data</p><p style="color:#888;font-size:14px">Please check your connection and try again</p><button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:#ff5c00;color:#fff;border:none;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer">Reload</button></div>';
    }
  }
}

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
var currentPage = 'locals';
var currentCity = 'hangzhou';
var currentLocalId = null;
var currentSessionId = null;

function getCityList() {
  var citySet = {};
  _localsCache.forEach(function(l) { if (l.city) citySet[l.city.toLowerCase()] = l.city; });
  _sessionsCache.forEach(function(s) { if (s.city) citySet[s.city.toLowerCase()] = s.city; });
  var ordered = ['hangzhou','dali','shanghai','beijing','chengdu'];
  var result = [];
  ordered.forEach(function(c) { if (citySet[c]) result.push(c); });
  Object.keys(citySet).forEach(function(c) { if (result.indexOf(c) === -1) result.push(c); });
  return result.length > 0 ? result : ['hangzhou'];
}

// ══════════════════════════════════════════════════
// ROUTING
// ══════════════════════════════════════════════════
function handleRoute() {
  if (!_dataLoaded) {
    setTimeout(handleRoute, 200);
    return;
  }
  window.__showAllSayHi = false;
  var hash = location.hash.slice(1) || 'locals';
  var parts = hash.split('/');

  if (parts[0] === 'locals') {
    if (parts[1]) currentCity = parts[1];
    renderLocalsPage();
    updateNav('locals');
  } else if (parts[0] === 'sessions') {
    if (parts[1]) currentCity = parts[1];
    renderSessionsPage();
    updateNav('sessions');
  } else if (parts[0] === 'local') {
    currentLocalId = parts[1];
    renderLocalDetail(parts[1]);
    updateNav('locals');
  } else if (parts[0] === 'session') {
    currentSessionId = parts[1];
    renderSessionDetail(parts[1]);
    updateNav('sessions');
  } else if (parts[0] === 'say-hi') {
    renderSayHiForm(parts[1]);
    updateNav('');
  } else if (parts[0] === 'success') {
    renderSuccessPage();
    updateNav('');
  } else {
    renderLocalsPage();
    updateNav('locals');
  }
  window.scrollTo(0, 0);
}

function goTo(page, id) {
  if (page === 'locals') {
    location.hash = id ? 'local/' + id : 'locals/' + currentCity;
  } else if (page === 'sessions') {
    location.hash = id ? 'session/' + id : 'sessions/' + currentCity;
  } else if (page === 'say-hi') {
    location.hash = 'say-hi/' + (id || '');
  } else if (page === 'success') {
    location.hash = 'success';
  }
}

function updateNav(active) {
  var navLocals = document.getElementById('navLocals');
  var navSessions = document.getElementById('navSessions');
  var mainHeader = document.getElementById('mainHeader');
  if (navLocals) navLocals.className = 'text-secondary hover:opacity-80 transition-opacity cursor-pointer';
  if (navSessions) navSessions.className = 'text-secondary hover:opacity-80 transition-opacity cursor-pointer';
  if (active === 'locals') {
    if (navLocals) navLocals.className = 'text-on-surface border-b-2 border-primary font-bold hover:opacity-80 transition-opacity cursor-pointer';
    if (mainHeader) mainHeader.style.display = '';
  } else if (active === 'sessions') {
    if (navSessions) navSessions.className = 'text-on-surface border-b-2 border-primary font-bold hover:opacity-80 transition-opacity cursor-pointer';
    if (mainHeader) mainHeader.style.display = '';
  } else {
    if (mainHeader) mainHeader.style.display = '';
  }
}

// ══════════════════════════════════════════════════
// CITY SELECTOR
// ══════════════════════════════════════════════════
function renderCitySelector(activeTab) {
  var allCities = getCityList();
  var cityLabels = {};
  allCities.forEach(function(c) { cityLabels[c] = c.charAt(0).toUpperCase() + c.slice(1); });
  var html = '<div class="flex gap-3 inline-flex">';
  allCities.forEach(function(c) {
    var isActive = c === currentCity;
    var cls = isActive ? 'pill-active' : 'pill-inactive';
    html += '<button class="' + cls + ' px-4 py-2 rounded-full text-label-sm font-label-sm transition-transform active:scale-95" onclick="switchCity(\'' + c + '\',\'' + activeTab + '\')">' + cityLabels[c] + '</button>';
  });
  html += '</div>';
  return html;
}

function switchCity(city, tab) {
  currentCity = city;
  if (tab === 'sessions') { location.hash = 'sessions/' + city; }
  else { location.hash = 'locals/' + city; }
}

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
function findLocal(id) {
  for (var i = 0; i < _localsCache.length; i++) {
    if (_localsCache[i].id === id) return { local: _localsCache[i], cityKey: _localsCache[i].city };
  }
  return null;
}

function findSession(id) {
  for (var i = 0; i < _sessionsCache.length; i++) {
    if (_sessionsCache[i].id === id) return { session: _sessionsCache[i], cityKey: _sessionsCache[i].city };
  }
  return null;
}

function findSessionByHostAndTitle(hostName, title) {
  for (var i = 0; i < _sessionsCache.length; i++) {
    if (_sessionsCache[i].hostId === hostName && _sessionsCache[i].title === title) return _sessionsCache[i];
  }
  return null;
}

function getLocalSessions(localId) {
  var result = [];
  for (var i = 0; i < _sessionsCache.length; i++) {
    if (_sessionsCache[i].hostId === localId) result.push(_sessionsCache[i]);
  }
  return result;
}

function avatarFallback(el) {
  if (!el) return;
  var initial = el.getAttribute('data-initial') || '?';
  var color = el.getAttribute('data-color') || '#999';
  var size = el.style.width || '50px';
  el.style.background = color;
  el.style.display = 'flex';
  el.style.alignItems = 'center';
  el.style.justifyContent = 'center';
  el.style.fontSize = Math.round(parseInt(size) * 0.4) + 'px';
  el.style.fontWeight = '700';
  el.style.color = '#fff';
  el.textContent = initial;
}

function avatarHTML(l, size, eager) {
  var s = size || 50;
  if (l.avatar) {
    var loadAttr = eager ? ' loading="eager"' : ' loading="lazy"';

async function submitSayHi(hostId) {
  var nameEl = document.getElementById('shName');
  var natEl = document.getElementById('shNat');
  var emailEl = document.getElementById('shEmail');
  var wechatEl = document.getElementById('shWechat');
  var tagsEl = document.getElementById('shTags');
  var msgEl = document.getElementById('shMsg');
  if (!nameEl || !nameEl.value.trim() || !emailEl || !emailEl.value.trim()) {
    alert('Please fill in all required fields.'); return;
  }
  // Check if photo is still uploading
  if (_photoUploading) {
    alert('Photo is still uploading, please wait...'); return;
  }
  var btn = document.getElementById('sayHiSubmit');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }
  var localResult = findLocal(hostId);
  var localName = localResult ? localResult.local.name : hostId;
  var payload = {
    guest_name: nameEl.value.trim(),
    guest_nationality: natEl ? natEl.value.trim() : '',
    guest_email: emailEl.value.trim(),
    guest_wechat: wechatEl ? wechatEl.value.trim() : '',
    guest_photo_token: _photoToken || '',
    guest_tags: tagsEl ? tagsEl.value.trim() : '',
    message: msgEl ? msgEl.value.trim() : '',
    local_name: localName,
    session_title: ''
  };
  try {
    var resp = await fetch(API_BASE + '/api/say-hi', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
    });
    if (!resp.ok) {
      var errBody = '';
      try { var errJson = await resp.json(); errBody = errJson.error || JSON.stringify(errJson); } catch(e2) { errBody = await resp.text().catch(function(){return '';}); }
      console.error('submitSayHi server error:', resp.status, errBody);
      throw new Error(errBody || ('HTTP ' + resp.status));
    }
    // Reset photo state on success
    _photoToken = null;
    goTo('success');
  } catch (e) {
    console.error('submitSayHi error:', e);
    alert('Failed to send: ' + e.message + '. Please try again.');
    if (btn) { btn.disabled = false; btn.textContent = 'Send Say Hi'; }
  }
}

// ══════════════════════════════════════════════════
// PHOTO UPLOAD
// ══════════════════════════════════════════════════
function handlePhotoSelect(input) {
  if (input.files && input.files[0]) {
    processPhotoFile(input.files[0]);
  }
}

function handlePhotoDrop(event) {
  if (event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0]) {
    var file = event.dataTransfer.files[0];
    if (file.type.startsWith('image/')) {
      processPhotoFile(file);
    } else {
      alert('Please upload an image file.');
    }
  }
}

function processPhotoFile(file) {
  var maxSize = 3 * 1024 * 1024; // 3MB
  if (file.size > maxSize) {
    alert('File is too large. Maximum size is 3MB.');
    return;
  }
  if (!file.type.startsWith('image/')) {
    alert('Please upload an image file.');
    return;
  }

  // Show preview immediately
  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    var previewEl = document.getElementById('photoPreview');
    var zoneEl = document.getElementById('photoUploadZone');
    if (zoneEl) zoneEl.style.display = 'none';

    var fileName = file.name;
    var fileSize = (file.size / 1024).toFixed(0) + ' KB';

    var previewHtml = '<div class="photo-preview">';
    previewHtml += '<img src="' + dataUrl + '" alt="Preview">';
    previewHtml += '<div class="photo-info"><div class="photo-name">' + escapeHtml(fileName) + '</div>';
    previewHtml += '<div class="photo-size">' + fileSize + '</div></div>';
    previewHtml += '<button class="photo-remove" onclick="removePhoto()" title="Remove">\u2715</button>';
    previewHtml += '</div>';
    previewEl.innerHTML = previewHtml;
    previewEl.style.display = 'block';

    // Start uploading
    uploadPhoto(file, dataUrl);
  };
  reader.readAsDataURL(file);
}

function uploadPhoto(file, dataUrl) {
  _photoUploading = true;
  _photoToken = null;

  var statusEl = document.getElementById('photoStatus');
  statusEl.innerHTML = '<div class="photo-status uploading"><span class="spinner-sm"></span> Uploading photo...</div>';

  // Extract base64 data (remove data:image/xxx;base64, prefix)
  var base64Data = dataUrl.split(',')[1];

  var payload = {
    file_name: file.name,
    file_size: file.size,
    file_base64: base64Data
  };

  fetch(API_BASE + '/api/upload-photo', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(resp) { return resp.json(); })
  .then(function(data) {
    _photoUploading = false;
    if (data.success && data.file_token) {
      _photoToken = data.file_token;
      statusEl.innerHTML = '<div class="photo-status success"><span class="material-symbols-outlined" style="font-size:16px">check_circle</span> Photo uploaded</div>';
    } else {
      statusEl.innerHTML = '<div class="photo-status error"><span class="material-symbols-outlined" style="font-size:16px">error</span> Upload failed. <a href="javascript:void(0)" onclick="retryPhotoUpload()" style="color:#e74c3c;text-decoration:underline">Retry</a></div>';
    }
  })
  .catch(function(err) {
    _photoUploading = false;
    console.error('uploadPhoto error:', err);
    statusEl.innerHTML = '<div class="photo-status error"><span class="material-symbols-outlined" style="font-size:16px">error</span> Upload failed. <a href="javascript:void(0)" onclick="retryPhotoUpload()" style="color:#e74c3c;text-decoration:underline">Retry</a></div>';
  });
}

function retryPhotoUpload() {
  var fileInput = document.getElementById('shPhotoFile');
  if (fileInput && fileInput.files && fileInput.files[0]) {
    var file = fileInput.files[0];
    var reader = new FileReader();
    reader.onload = function(e) {
      uploadPhoto(file, e.target.result);
    };
    reader.readAsDataURL(file);
    var statusEl = document.getElementById('photoStatus');
    statusEl.innerHTML = '<div class="photo-status uploading"><span class="spinner-sm"></span> Retrying upload...</div>';
  }
}

function removePhoto() {
  _photoToken = null;
  _photoUploading = false;
  var previewEl = document.getElementById('photoPreview');
  var zoneEl = document.getElementById('photoUploadZone');
  var statusEl = document.getElementById('photoStatus');
  var fileInput = document.getElementById('shPhotoFile');

  if (previewEl) { previewEl.innerHTML = ''; previewEl.style.display = 'none'; }
  if (zoneEl) zoneEl.style.display = '';
  if (statusEl) statusEl.innerHTML = '';
  if (fileInput) fileInput.value = '';
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}
